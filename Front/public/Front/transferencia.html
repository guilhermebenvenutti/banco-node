<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco LOF - Transferência</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>GGBank</h1>
    <h2>Transferência</h2>
    
    <form id="transferenciaForm">
      <input type="text" id="cpfDestino" placeholder="CPF do recebedor (Chave PIX)" maxlength="14" required>
      <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
      <textarea id="descricao" placeholder="Descrição (opcional)" rows="3"></textarea>
      
      <button type="submit">Realizar Transferência</button>
    </form>

    <button onclick="window.location.href='dashboard.html'">Voltar ao Dashboard</button>
    <div id="mensagem" class="error"></div>
  </div>

  <script src="js/transferencia.js"></script>
</body>
</html>
